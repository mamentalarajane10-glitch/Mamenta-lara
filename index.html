<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index.html</title>
    <style>
        /* Centers the login/signup box on the browser page */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        /* Design container for the form card */
        .login-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 320px;
        }
        .login-container h2 {
            margin-bottom: 20px;
            text-align: center;
            color: #333333;
        }
        /* Form spacing and layout alignment */
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666666;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        /* Submit button styling */
        .btn-submit {
            width: 100%;
            padding: 10px;
            background-color: #ff69b4;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-submit:hover {
            background-color: #ff1493;
        }
        /* Toggle link styling */
        .switch-form {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #666666;
        }
        .switch-form a {
            color: #ff69b4;
            text-decoration: none;
        }
        .switch-form a:hover {
            text-decoration: underline;
        }
        /* Form visibility utility */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="login-container">
    
    <!-- Sign Up Form (Default View) -->
    <div id="signup-section">
        <h2>Create Account</h2>
        <form action="places.html" method="POST">
            
            <div class="form-group">
                <label for="signup-username">Username or Email</label>
                <input type="text" id="signup-username" name="username" required placeholder="Choose a username">
            </div>
            
            <div class="form-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" name="password" required placeholder="Create a password">
            </div>
            
            <button type="submit" class="btn-submit">Sign Up</button>
            
            <div class="switch-form">
                Already have an account? <a href="#" onclick="toggleForms(event)">Sign In</a>
            </div>
        </form>
    </div>

    <!-- Sign In Form (Hidden by Default) -->
    <div id="signin-section" class="hidden">
        <h2>Account Login</h2>
        <form action="places.html" method="POST">
            
            <div class="form-group">
                <label for="signin-username">Username or Email</label>
                <input type="text" id="signin-username" name="username" required placeholder="Enter username">
            </div>
            
            <div class="form-group">
                <label for="signin-password">Password</label>
                <input type="password" id="signin-password" name="password" required placeholder="Enter password">
            </div>
            
            <button type="submit" class="btn-submit">Sign In</button>
            
            <div class="switch-form">
                Don't have an account? <a href="#" onclick="toggleForms(event)">Sign Up</a>
            </div>
        </form>
    </div>

</div>

<script>
    function toggleForms(event) {
        event.preventDefault();
        const signupSection = document.getElementById('signup-section');
        const signinSection = document.getElementById('signin-section');
        
        signupSection.classList.toggle('hidden');
        signinSection.classList.toggle('hidden');
    }
</script>

</body>
</html>
