<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <style>
        /* Centers the login box on the browser page */
        body {
            font-family: Arial, sans-serif;
            background-color: #pink#
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        /* Design container for the form card */
        .login-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 320px;
        }
        .login-container h2 {
            margin-bottom: 20px;
            text-align: center;
            color: #333333;
        }
        /* Form spacing and layout alignment */
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666666;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Ensures width calculations match styling */
        }
        /* Submit button styling */
        .btn-submit {
            width: 100%;
            padding: 10px;
            background-color: #pink;
          <td><img scr=""</td>
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-submit:hover {
            background-color: pink;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Account Login</h2>
    <!-- The form sends data using POST for privacy protection -->
    <form action="places.html" method="lala.html">
        
        <!-- Username or Email Field -->
        <div class="form-group">
            <label for="username">Username or Email</label>
            <input type="text" id="username" name="username" required placeholder="Enter username">
        </div>
        
        <!-- Password Field -->
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter password">
        </div>
        
        <!-- Submit Button -->
        <button type="Kalanggaman Island Resort Reservation Form.html" class="btn-submit">Sign In</button>
        
    </form>
</div>

</body>
</html>
