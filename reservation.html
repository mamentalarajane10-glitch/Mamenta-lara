<!DOCTYPE html>
<html>
<head>
<title>Caluwayan palm island Resort</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:url("https://i.ibb.co/v6KsTMwF/pool.jpg") center center fixed;
    background-size:cover;
    padding:40px;
}

.container{
    width:750px;
    margin:auto;
    background:rgba(255,255,255,0.93);
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.4);
}

.header{
    background:url("https://i.ibb.co/v6KsTMwF/pool.jpg") center center/cover no-repeat;
    height:220px;
    position:relative;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.header::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.45);
}

.header h1,
.header p{
    position:relative;
    z-index:1;
}

.header h1{
    font-size:42px;
    margin-bottom:10px;
    text-shadow:2px 2px 5px black;
}

.header p{
    font-size:16px;
    text-shadow:1px 1px 3px black;
}

.title{
    background:#0c6c7d;
    color:white;
    text-align:center;
    padding:18px;
    font-size:30px;
    font-weight:bold;
    letter-spacing:1px;
}

.form{
    padding:35px;
}

.section{
    text-align:center;
    margin-bottom:25px;
    color:#0c6c7d;
}

.row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.column{
    flex:1;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
}

input,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

input:focus,
textarea:focus{
    outline:none;
    border-color:#0c6c7d;
}

textarea{
    height:120px;
    resize:none;
}

/* Gender radio buttons */
.gender{
    margin-top:10px;
}

.gender input[type="radio"]{
    width:auto;
    margin-right:5px;
}

.gender label{
    display:inline;
    font-weight:normal;
    margin-right:20px;
}

.buttons{
    text-align:center;
    margin-top:25px;
}

button{
    background:#0c6c7d;
    color:white;
    border:none;
    padding:13px 35px;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
    transition:.3s;
}

button:hover{
    background:#094d59;
    transform:scale(1.05);
}

.footer{
    background:#f2f2f2;
    text-align:center;
    padding:15px;
    color:#666;
    font-size:14px;
}
</style>

<script>
function reserve(){

var name=document.getElementById("name").value;

if(name==""){
alert("Please complete the form.");
return;
}

alert("Thank you, "+name+"!\n\nYour reservation has been submitted successfully.");
}

function clearForm(){
document.getElementById("reserveForm").reset();
}
</script>

</head>

<body>

<div class="container">

<div class="header">
<h1>Caluwayan palm island resort</h1>
<p>www.caluwayan.com</p>
<p>+63 912 345 6789</p>
</div>

<div class="title">
Caluwayan palm island resort 
  
</div>

<div class="form">

<form id="reserveForm">

<h2 class="section">Contact Information</h2>

<div class="row">

<div class="column">
<label>Full Name</label>
<input type="text" id="name" required>
</div>

<div class="column">
<label>Address</label>
<input type="text" required>
</div>

</div>

<div class="row">

<div class="column">
<label>Email Address</label>
<input type="email" required>
</div>

<div class="column">
<label>Contact Number</label>
<input type="tel" required>
</div>

</div>

<!-- Gender -->
<div class="row">

<div class="column">
<label>Gender</label>

<div class="gender">
<input type="radio" id="male" name="gender" value="Male" required>
<label for="male">Male</label>

<input type="radio" id="female" name="gender" value="Female">
<label for="female">Female</label>
</div>

</div>

<div class="column">
</div>

</div>

<h2 class="section">Event Details</h2>

<div class="row">

<div class="column">
<label>Event Type</label>
<input type="text" placeholder="Birthday, Wedding, Seminar..." required>
</div>

<div class="column">
<label>Event Date</label>
<input type="date" required>
</div>

</div>

<div class="row">

<div class="column">
<label>Event Time</label>
<input type="time" required>
</div>

<div class="column">
<label>Total Guests</label>
<input type="number" min="1" required>
</div>

</div>

<label>Additional Requests</label>
<textarea placeholder="Enter your requests here..."></textarea>

<div class="buttons">
<a href="FOOD.html" class="button">RESERVE
</div>

</form>

</div>

<div class="footer">
© 2026 Caluwayan Resort | Experience Luxury by the Sea
</div>

</div>

</body>
</html>
